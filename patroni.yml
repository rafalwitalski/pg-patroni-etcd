scope: pg-cluster

log:
  level: INFO

etcd3:
  hosts: etcd1:2379,etcd2:2379,etcd3:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    synchronous_mode: on
    postgresql:
      use_pg_rewind: true
      parameters:
        wal_level: replica
        max_wal_senders: 10
        wal_keep_size: 128MB
        hot_standby: "on"

  initdb:
    - encoding: UTF8
    - data-checksums
    - auth-host: scram-sha-256

postgresql:
  listen: 0.0.0.0:5432
  data_dir: /var/lib/pgsql/18/data
  pgpass: /tmp/pgpass
  authentication:
    superuser:
      username: postgres
      password: postgres
    replication:
      username: replicator
      password: replicator
  pg_hba:
    - local all all peer
    - host all all 0.0.0.0/0 scram-sha-256
    - host replication replicator 0.0.0.0/0 scram-sha-256

restapi:
  listen: 0.0.0.0:8008

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
